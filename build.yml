name: Build SFC Windows App
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller streamlit pdfplumber pandas
    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed --name "SFC_Super_Dashboard" dailyyield.py
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SFC-Windows-Executable
        path: dist/SFC_Super_Dashboard.exe